services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: three-row-game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./ThreeInRowBackend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: three-row-game
      DB_USER: postgres
      DB_PASSWORD: user
      FRONT_HOSTS: "http://localhost,http://127.0.0.1"
      TZ: UTC
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./ThreeInRowFrontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
